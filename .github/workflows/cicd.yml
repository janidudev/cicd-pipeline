name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Jar
        run: ./mvnw clean package -DskipTests

      - name: Login to Docker Hub (using Access Token)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} # <-- put your Docker Hub Access Token here

      - name: Build Docker Image
        run: |
          docker build --pull \
            -t "${{ secrets.DOCKER_USERNAME }}/springboot-ci-demo:latest" \
            -t "${{ secrets.DOCKER_USERNAME }}/springboot-ci-demo:${{ github.sha }}" \
            .

      - name: Push Image to Docker Hub
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/springboot-ci-demo:latest"
          docker push "${{ secrets.DOCKER_USERNAME }}/springboot-ci-demo:${{ github.sha }}"

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            docker pull ${{ secrets.DOCKER_USERNAME }}/springboot-ci-demo:latest
            docker stop springboot-ci-demo || true
            docker rm springboot-ci-demo || true
            docker run -d --restart unless-stopped --name springboot-ci-demo -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/springboot-ci-demo:latest
            docker ps --filter "name=springboot-ci-demo"
